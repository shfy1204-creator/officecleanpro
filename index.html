<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>오피스클린프로</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0c0f14;--bg2:#141821;--bg3:#1c2230;--card:#1a1f2e;--border:#2a3040;--text:#e4e8f0;--text2:#8892a6;--accent:#3b82f6;--accent2:#60a5fa;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--orange:#f97316;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}button{cursor:pointer;font-family:inherit}input,textarea,select{font-family:inherit}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}#loading.hidden{display:none}.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;z-index:10000;animation:slideIn .3s}.toast.error{background:var(--red)}.toast.success{background:var(--green)}@keyframes slideIn{from{transform:translateX(100%);opacity:0}}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 32px;width:100%;max-width:380px}.login-box h1{font-size:24px;font-weight:700;color:var(--accent2);margin-bottom:8px;text-align:center}.login-box p{color:var(--text2);font-size:13px;text-align:center;margin-bottom:28px}
.field{margin-bottom:16px}.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}.field input{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none}.field input:focus{border-color:var(--accent)}
.btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;margin-top:8px;transition:background .2s}.btn:hover{background:var(--accent2)}.btn:disabled{opacity:.5;cursor:not-allowed}
#settingsPanel{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px}#settingsPanel.show{display:flex}.settings-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:400px}.settings-box h3{margin-bottom:16px;font-size:16px}
#app{display:none}#app.show{display:block}.navbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}.navbar h2{font-size:16px;font-weight:600;color:var(--accent2)}.navbar-right{display:flex;align-items:center;gap:10px}.navbar-right span{font-size:12px;color:var(--text2)}.logout-btn{padding:6px 12px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:6px;font-size:12px}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto}.tab{padding:10px 16px;font-size:13px;color:var(--text2);border:none;background:none;white-space:nowrap;border-bottom:2px solid transparent}.tab.active{color:var(--accent2);border-bottom-color:var(--accent);font-weight:600}
.content{padding:16px;max-width:900px;margin:0 auto}.section-title{font-size:18px;font-weight:700;margin-bottom:16px}
.month-selector{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}.month-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:13px;white-space:nowrap}.month-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}.card-title{font-size:15px;font-weight:600}.card-subtitle{font-size:12px;color:var(--text2);margin-top:2px}.card-amount{font-size:18px;font-weight:700;color:var(--green)}.card-amount.small{font-size:14px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}.badge-area{background:rgba(59,130,246,.15);color:var(--accent2)}.badge-day{background:rgba(34,197,94,.15);color:var(--green)}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px}.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px}.stat-value{font-size:20px;font-weight:700}.stat-value.blue{color:var(--accent2)}.stat-value.green{color:var(--green)}.stat-value.yellow{color:var(--yellow)}.stat-value.red{color:var(--red)}
.table-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;padding:10px 12px;background:var(--bg3);color:var(--text2);font-weight:500;border-bottom:1px solid var(--border)}td{padding:10px 12px;border-bottom:1px solid var(--border)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;overflow-y:auto;padding:20px}.modal-overlay.show{display:block}.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:500px;margin:20px auto;padding:24px}.modal-close{float:right;background:none;border:none;color:var(--text2);font-size:20px}.modal h3{font-size:18px;font-weight:700;margin-bottom:16px;clear:both}.modal .field textarea{width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;resize:vertical;min-height:60px}.modal .btn-sm{padding:8px 16px;font-size:13px;border-radius:6px;border:none;color:#fff;font-weight:500}.btn-green{background:var(--green)}.btn-blue{background:var(--accent)}.btn-red{background:var(--red)}
.search-box{margin-bottom:16px}.search-box input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;font-size:12px}.cal-header{padding:6px;color:var(--text2);font-weight:500}.cal-day{padding:6px;border-radius:6px;min-height:32px;display:flex;align-items:center;justify-content:center}.cal-day.scheduled{background:rgba(59,130,246,.2);color:var(--accent2);font-weight:600}.cal-day.completed{background:rgba(34,197,94,.2);color:var(--green);font-weight:600}.cal-day.today{border:1px solid var(--yellow)}.cal-day.empty{opacity:.3}
.analysis-card{background:linear-gradient(135deg,var(--bg3),var(--card));border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}.analysis-card h4{font-size:14px;color:var(--yellow);margin-bottom:8px}.analysis-card p{font-size:13px;color:var(--text2);line-height:1.6}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr}.content{padding:12px}}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div id="loginScreen" style="display:none;"><div class="login-box"><h1>오피스클린프로</h1><p>청소사업 관리 시스템</p><div class="field"><label>이메일</label><input type="email" id="loginEmail" placeholder="이름@officecleanpro.local"></div><div class="field"><label>비밀번호</label><input type="password" id="loginPw" placeholder="비밀번호 입력"></div><button class="btn" id="loginBtn" onclick="doLogin()">로그인</button><div style="margin-top:16px;text-align:center;"><button style="background:none;border:none;color:var(--text2);font-size:12px;text-decoration:underline;cursor:pointer;" onclick="toggleSettings()">⚙️ Supabase 설정</button></div></div></div>
<div id="settingsPanel"><div class="settings-box"><h3>⚙️ Supabase 연결 설정</h3><div class="field"><label>Supabase URL</label><input type="text" id="supaUrl" placeholder="https://xxx.supabase.co"></div><div class="field"><label>Anon Key</label><input type="text" id="supaKey" placeholder="eyJhbGciOi..."></div><button class="btn" onclick="saveSettings()">저장</button><button class="btn" style="background:var(--bg3);margin-top:8px;" onclick="toggleSettings()">닫기</button></div></div>
<div id="app"><nav class="navbar"><h2>오피스클린프로</h2><div class="navbar-right"><span id="userName"></span><button class="logout-btn" onclick="doLogout()">로그아웃</button></div></nav><div class="tabs" id="staffTabs" style="display:none;"><button class="tab active" onclick="switchTab('myClients',this)">내 업체</button><button class="tab" onclick="switchTab('myPay',this)">내 급여</button></div><div class="tabs" id="adminTabs" style="display:none;"><button class="tab active" onclick="switchTab('dashboard',this)">대시보드</button><button class="tab" onclick="switchTab('allClients',this)">업체관리</button><button class="tab" onclick="switchTab('staffPay',this)">담당자급여</button><button class="tab" onclick="switchTab('areaSummary',this)">구역별</button><button class="tab" onclick="switchTab('analysis',this)">AI분석</button></div><div class="content" id="mainContent"></div></div>
<div class="modal-overlay" id="detailModal"><div class="modal" id="modalBody"></div></div>
<script>
let supabase=null,currentUser=null,currentProfile=null,selectedMonth='3월',allData={};
window.onload=async()=>{const url=localStorage.getItem('supa_url'),key=localStorage.getItem('supa_key');if(!url||!key){document.getElementById('loading').classList.add('hidden');document.getElementById('loginScreen').style.display='flex';toggleSettings();return}initSupabase(url,key);const{data:{session}}=await supabase.auth.getSession();if(session)await onLogin(session);else{document.getElementById('loading').classList.add('hidden');document.getElementById('loginScreen').style.display='flex'}};
function initSupabase(u,k){supabase=window.supabase.createClient(u,k)}
function toggleSettings(){const p=document.getElementById('settingsPanel');p.classList.toggle('show');document.getElementById('supaUrl').value=localStorage.getItem('supa_url')||'https://apnwhqklpwzevguyrjwd.supabase.co';document.getElementById('supaKey').value=localStorage.getItem('supa_key')||''}
function saveSettings(){const u=document.getElementById('supaUrl').value.trim(),k=document.getElementById('supaKey').value.trim();if(!u||!k)return toast('URL과 Key를 모두 입력하세요','error');localStorage.setItem('supa_url',u);localStorage.setItem('supa_key',k);initSupabase(u,k);toggleSettings();toast('설정 저장됨','success')}
async function doLogin(){const e=document.getElementById('loginEmail').value.trim(),p=document.getElementById('loginPw').value.trim();if(!e||!p)return toast('이메일/비밀번호를 입력하세요','error');if(!supabase){const u=localStorage.getItem('supa_url'),k=localStorage.getItem('supa_key');if(!u||!k)return toast('먼저 Supabase 설정을 해주세요','error');initSupabase(u,k)}document.getElementById('loginBtn').disabled=true;const{data,error}=await supabase.auth.signInWithPassword({email:e,password:p});document.getElementById('loginBtn').disabled=false;if(error)return toast(error.message,'error');await onLogin(data.session)}
async function onLogin(s){currentUser=s.user;const{data:p}=await supabase.from('profiles').select('*').eq('id',currentUser.id).single();currentProfile=p;document.getElementById('loading').classList.add('hidden');document.getElementById('loginScreen').style.display='none';document.getElementById('app').classList.add('show');document.getElementById('userName').textContent=p.name+' ('+p.role+')';if(p.role==='admin'){document.getElementById('adminTabs').style.display='flex';document.getElementById('staffTabs').style.display='none';await loadAdminData();renderDashboard()}else{document.getElementById('staffTabs').style.display='flex';document.getElementById('adminTabs').style.display='none';await loadStaffData();renderMyClients()}}
async function doLogout(){await supabase.auth.signOut();location.reload()}
async function loadAdminData(){const[c,co,a]=await Promise.all([supabase.from('clients').select('*'),supabase.from('contracts').select('*'),supabase.from('contract_assignments').select('*')]);allData.clients=c.data||[];allData.contracts=co.data||[];allData.assignments=a.data||[]}
async function loadStaffData(){const[a,c,cl]=await Promise.all([supabase.from('contract_assignments').select('*'),supabase.from('contracts').select('*'),supabase.from('clients').select('*')]);allData.assignments=a.data||[];allData.contracts=c.data||[];allData.clients=cl.data||[]}
function switchTab(t,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');({myClients:renderMyClients,myPay:renderMyPay,dashboard:renderDashboard,allClients:renderAllClients,staffPay:renderStaffPay,areaSummary:renderAreaSummary,analysis:renderAnalysis})[t]?.()}
function monthSelector(cb){return '<div class="month-selector">'+['2월','3월'].map(m=>'<button class="month-btn '+(m===selectedMonth?'active':'')+'" onclick="selectedMonth=\''+m+'\';'+cb+'">'+m+'</button>').join('')+'</div>'}
function fmt(n){return(n||0).toLocaleString('ko-KR')}
function getClient(id){return allData.clients.find(c=>c.id===id)||{}}
function getMonthContracts(m){return allData.contracts.filter(c=>c.month===m)}
function getContractAssignments(cid){return allData.assignments.filter(a=>a.contract_id===cid)}

function renderMyClients(){const mc=getMonthContracts(selectedMonth),my=allData.assignments.filter(a=>a.staff_profile_id===currentUser.id&&mc.some(c=>c.id===a.contract_id));let h=monthSelector('renderMyClients()');h+='<div class="section-title">내 업체 목록 ('+my.length+'개)</div>';my.forEach(a=>{const ct=allData.contracts.find(c=>c.id===a.contract_id),cl=ct?getClient(ct.client_id):{};h+='<div class="card" onclick="openDetail('+cl.id+','+ct?.id+')"><div class="card-header"><div><div class="card-title">'+cl.company_name+'</div><div class="card-subtitle">'+(cl.location||'')+'</div></div><div class="card-amount">'+fmt(a.real_amount)+'원</div></div><div style="display:flex;gap:6px;margin-top:6px">'+(cl.area_name?'<span class="badge badge-area">'+cl.area_name+'</span>':'')+(cl.clean_day?'<span class="badge badge-day">'+cl.clean_day+'</span>':'')+'</div></div>'});if(!my.length)h+='<div class="card"><p style="color:var(--text2)">배정된 업체가 없습니다.</p></div>';document.getElementById('mainContent').innerHTML=h}
function renderMyPay(){let h='<div class="section-title">내 급여 현황</div>',t=0;['2월','3월'].forEach(m=>{const mc=getMonthContracts(m),my=allData.assignments.filter(a=>a.staff_profile_id===currentUser.id&&mc.some(c=>c.id===a.contract_id)),s=my.reduce((s,a)=>s+(a.real_amount||0),0);t+=s;h+='<div class="card"><div class="card-header"><div class="card-title">'+m+'</div><div class="card-amount">'+fmt(s)+'원</div></div><div style="font-size:12px;color:var(--text2);margin-top:4px">업체 '+my.length+'개</div></div>'});h+='<div class="card" style="border-color:var(--accent)"><div class="card-header"><div class="card-title" style="color:var(--accent2)">합계</div><div class="card-amount">'+fmt(t)+'원</div></div></div>';document.getElementById('mainContent').innerHTML=h}
async function openDetail(cid,ctid){const cl=getClient(cid),ct=allData.contracts.find(c=>c.id===ctid),my=allData.assignments.find(a=>a.contract_id===ctid&&(currentProfile.role==='admin'||a.staff_profile_id===currentUser.id));const{data:ns}=await supabase.from('client_notes').select('*').eq('client_id',cid).limit(1);const n=ns?.[0]||{};const{data:rq}=await supabase.from('special_requests').select('*').eq('client_id',cid).gt('expires_at',new Date().toISOString()).order('created_at',{ascending:false});const{data:cp}=await supabase.from('cleaning_completions').select('*').eq('client_id',cid);let h='<button class="modal-close" onclick="closeModal()">✕</button><h3>'+cl.company_name+'</h3><p style="font-size:13px;color:var(--text2);margin-bottom:12px">'+(cl.location||'')+'</p><div style="display:flex;gap:6px;margin-bottom:16px">'+(cl.area_name?'<span class="badge badge-area">'+cl.area_name+'</span>':'')+(cl.clean_day?'<span class="badge badge-day">'+cl.clean_day+'</span>':'')+'</div>';if(my)h+='<div class="card" style="background:var(--bg)"><div style="font-size:12px;color:var(--text2)">내 수령액</div><div style="font-size:22px;font-weight:700;color:var(--green)">'+fmt(my.real_amount)+'원</div></div>';h+='<div class="card" style="background:var(--bg)"><div style="font-size:13px;font-weight:600;margin-bottom:8px">📅 이번 달 일정</div>'+renderCal(cl.clean_day,cp||[])+'</div>';h+='<div class="card" style="background:var(--bg)"><div style="font-size:13px;font-weight:600;margin-bottom:8px">📋 업체 정보</div><div class="field"><label>특이사항</label><textarea id="n_s">'+(n.special_notes||'')+'</textarea></div><div class="field"><label>분리수거장</label><textarea id="n_r">'+(n.recycling_location||'')+'</textarea></div><div class="field"><label>비밀번호</label><input type="text" id="n_p" value="'+(n.office_password||'')+'"></div><div class="field"><label>주차</label><textarea id="n_k">'+(n.parking_info||'')+'</textarea></div><button class="btn-sm btn-blue" onclick="saveN('+cid+','+(n.id||'null')+')">저장</button></div>';h+='<div class="card" style="background:var(--bg)"><div style="font-size:13px;font-weight:600;margin-bottom:8px">⚡ 특별 요청 (7일 자동만료)</div>';(rq||[]).forEach(r=>{const d=Math.ceil((new Date(r.expires_at)-new Date())/86400000);h+='<div style="padding:8px;background:var(--bg2);border-radius:6px;margin-bottom:6px;font-size:13px">'+r.request_text+' <span style="color:var(--yellow);font-size:11px">('+d+'일)</span></div>'});h+='<div class="field" style="margin-top:8px"><textarea id="nReq" placeholder="새 요청사항"></textarea></div><button class="btn-sm btn-green" onclick="addReq('+cid+')">추가</button></div>';h+='<div class="card" style="background:var(--bg)"><div style="font-size:13px;font-weight:600;margin-bottom:8px">✅ 청소 완료</div><button class="btn-sm btn-green" onclick="markDone('+cid+','+ctid+')">오늘 완료</button><div style="margin-top:8px;font-size:12px;color:var(--text2)">최근: '+((cp||[]).slice(-3).map(c=>c.completed_date).join(', ')||'없음')+'</div></div>';document.getElementById('modalBody').innerHTML=h;document.getElementById('detailModal').classList.add('show')}
function closeModal(){document.getElementById('detailModal').classList.remove('show')}
function renderCal(cd,cp){const now=new Date(),y=now.getFullYear(),m=now.getMonth(),fd=new Date(y,m,1).getDay(),dm=new Date(y,m+1,0).getDate(),td=now.getDate(),dm2={'일':0,'월':1,'화':2,'수':3,'목':4,'금':5,'토':6};const sd=new Set();if(cd){cd.replace(/[,\s]+/g,',').split(',').filter(Boolean).forEach(d=>{const v=dm2[d.trim()];if(v!==undefined)for(let i=1;i<=dm;i++)if(new Date(y,m,i).getDay()===v)sd.add(i)});if(cd.includes('주말'))for(let i=1;i<=dm;i++){const w=new Date(y,m,i).getDay();if(w===0||w===6)sd.add(i)}}const cd2=new Set((cp||[]).map(c=>{const d=new Date(c.completed_date);return d.getMonth()===m&&d.getFullYear()===y?d.getDate():null}).filter(Boolean));let h='<div class="cal-grid">';['일','월','화','수','목','금','토'].forEach(d=>h+='<div class="cal-header">'+d+'</div>');for(let i=0;i<fd;i++)h+='<div class="cal-day empty"></div>';for(let d=1;d<=dm;d++){const cl=['cal-day'];if(cd2.has(d))cl.push('completed');else if(sd.has(d))cl.push('scheduled');if(d===td)cl.push('today');h+='<div class="'+cl.join(' ')+'">'+d+'</div>'}return h+'</div><div style="margin-top:6px;font-size:11px;color:var(--text2)">🔵예정 🟢완료 🟡오늘</div>'}
async function saveN(cid,nid){const d={client_id:cid,special_notes:document.getElementById('n_s').value,recycling_location:document.getElementById('n_r').value,office_password:document.getElementById('n_p').value,parking_info:document.getElementById('n_k').value,updated_by:currentUser.id};if(nid)await supabase.from('client_notes').update(d).eq('id',nid);else await supabase.from('client_notes').insert(d);toast('저장됨','success')}
async function addReq(cid){const t=document.getElementById('nReq').value.trim();if(!t)return toast('입력하세요','error');const ex=new Date();ex.setDate(ex.getDate()+7);await supabase.from('special_requests').insert({client_id:cid,request_text:t,created_by:currentUser.id,expires_at:ex.toISOString()});toast('추가됨','success');document.getElementById('nReq').value=''}
async function markDone(cid,ctid){const{error}=await supabase.from('cleaning_completions').insert({client_id:cid,contract_id:ctid,completed_date:new Date().toISOString().split('T')[0],completed_by:currentUser.id});if(error)return toast(error.message,'error');toast('완료!','success')}
function renderDashboard(){const mc=getMonthContracts(selectedMonth),as=allData.assignments.filter(a=>mc.some(c=>c.id===a.contract_id)),tc=mc.reduce((s,c)=>s+(c.contract_amount||0),0),te=mc.reduce((s,c)=>s+(c.eco_amount||0),0),tw=as.reduce((s,a)=>s+(a.real_amount||0),0),mg=tc-te-tw;let h=monthSelector('renderDashboard()');h+='<div class="stats-grid"><div class="stat-card"><div class="stat-label">총 계약금액</div><div class="stat-value blue">'+fmt(tc)+'</div></div><div class="stat-card"><div class="stat-label">에코오피스클린</div><div class="stat-value red">'+fmt(te)+'</div></div><div class="stat-card"><div class="stat-label">작업자 지급액</div><div class="stat-value yellow">'+fmt(tw)+'</div></div><div class="stat-card"><div class="stat-label">마진</div><div class="stat-value green">'+fmt(mg)+'</div></div></div>';h+='<div class="section-title">담당자별 급여</div>';const sm={};as.forEach(a=>{if(!sm[a.staff_name])sm[a.staff_name]={t:0,c:0};sm[a.staff_name].t+=a.real_amount||0;sm[a.staff_name].c++});Object.entries(sm).sort((a,b)=>b[1].t-a[1].t).forEach(([n,i])=>h+='<div class="card"><div class="card-header"><div><div class="card-title">'+n+'</div><div class="card-subtitle">'+i.c+'개</div></div><div class="card-amount">'+fmt(i.t)+'원</div></div></div>');document.getElementById('mainContent').innerHTML=h}
function renderAllClients(){const mc=getMonthContracts(selectedMonth);let h=monthSelector('renderAllClients()');h+='<div class="search-box"><input placeholder="검색" oninput="filterC(this.value)"></div><div id="cL">';mc.forEach(c=>{const cl=getClient(c.client_id),as=getContractAssignments(c.id),sn=as.map(a=>a.staff_name).join(', ');h+='<div class="card cI" data-s="'+cl.company_name+' '+cl.location+' '+sn+'" onclick="openDetail('+cl.id+','+c.id+')"><div class="card-header"><div><div class="card-title">'+cl.company_name+'</div><div class="card-subtitle">'+(cl.location||'')+'</div></div><div class="card-amount small">'+fmt(c.contract_amount)+'원</div></div><div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">'+(cl.area_name?'<span class="badge badge-area">'+cl.area_name+'</span>':'')+(cl.clean_day?'<span class="badge badge-day">'+cl.clean_day+'</span>':'')+'<span style="font-size:11px;color:var(--text2)">👤 '+sn+'</span></div></div>'});h+='</div>';document.getElementById('mainContent').innerHTML=h}
function filterC(q){document.querySelectorAll('.cI').forEach(e=>e.style.display=e.dataset.s.includes(q)?'block':'none')}
function renderStaffPay(){let h=monthSelector('renderStaffPay()');h+='<div class="section-title">담당자별 급여 상세</div>';const mc=getMonthContracts(selectedMonth),as=allData.assignments.filter(a=>mc.some(c=>c.id===a.contract_id)),sm={};as.forEach(a=>{if(!sm[a.staff_name])sm[a.staff_name]=[];const ct=allData.contracts.find(c=>c.id===a.contract_id),cl=ct?getClient(ct.client_id):{};sm[a.staff_name].push({...a,cl,ct})});Object.entries(sm).sort((a,b)=>b[1].reduce((s,x)=>s+x.real_amount,0)-a[1].reduce((s,x)=>s+x.real_amount,0)).forEach(([n,items])=>{const t=items.reduce((s,x)=>s+x.real_amount,0);h+='<div class="card"><div class="card-header"><div class="card-title">'+n+'</div><div class="card-amount">'+fmt(t)+'원</div></div><div class="table-wrap" style="margin-top:8px"><table><tr><th>업체</th><th>구역</th><th>금액</th></tr>';items.forEach(i=>h+='<tr><td>'+i.cl.company_name+'</td><td>'+(i.cl.area_name||'')+'</td><td style="color:var(--green);font-weight:600">'+fmt(i.real_amount)+'</td></tr>');h+='</table></div></div>'});document.getElementById('mainContent').innerHTML=h}
function renderAreaSummary(){let h=monthSelector('renderAreaSummary()');const mc=getMonthContracts(selectedMonth),am={};mc.forEach(c=>{const cl=getClient(c.client_id),a=cl.area_name||'기타';if(!am[a])am[a]={c:0,e:0,w:0,n:0};am[a].c+=c.contract_amount||0;am[a].e+=c.eco_amount||0;am[a].w+=c.worker_pay_total||0;am[a].n++});Object.entries(am).sort((a,b)=>b[1].c-a[1].c).forEach(([a,i])=>{const m=i.c-i.e-i.w,r=i.c>0?((m/i.c)*100).toFixed(1):0;h+='<div class="card"><div class="card-header"><div class="card-title">'+a+' ('+i.n+'개)</div><div class="card-amount small">'+fmt(i.c)+'원</div></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;font-size:12px"><div><span style="color:var(--text2)">에코</span><br><span style="color:var(--red)">'+fmt(i.e)+'</span></div><div><span style="color:var(--text2)">작업자</span><br><span style="color:var(--yellow)">'+fmt(i.w)+'</span></div><div><span style="color:var(--text2)">마진('+r+'%)</span><br><span style="color:var(--green)">'+fmt(m)+'</span></div></div></div>'});document.getElementById('mainContent').innerHTML=h}
function renderAnalysis(){const mc=getMonthContracts(selectedMonth),as=allData.assignments.filter(a=>mc.some(c=>c.id===a.contract_id)),tc=mc.reduce((s,c)=>s+(c.contract_amount||0),0),te=mc.reduce((s,c)=>s+(c.eco_amount||0),0),tw=as.reduce((s,a)=>s+(a.real_amount||0),0),mg=tc-te-tw,mr=tc>0?((mg/tc)*100).toFixed(1):0;const cms=mc.map(c=>{const cl=getClient(c.client_id),ca=getContractAssignments(c.id),w=ca.reduce((s,a)=>s+(a.real_amount||0),0),m=(c.contract_amount||0)-(c.eco_amount||0)-w;return{n:cl.company_name,a:cl.area_name,c:c.contract_amount,m,r:c.contract_amount>0?(m/c.contract_amount*100):0}}).sort((a,b)=>a.r-b.r);const low=cms.filter(c=>c.r<5).slice(0,5),high=cms.filter(c=>c.r>15).sort((a,b)=>b.r-a.r).slice(0,5);const sw={};as.forEach(a=>{if(!sw[a.staff_name])sw[a.staff_name]={t:0,c:0};sw[a.staff_name].t+=a.real_amount||0;sw[a.staff_name].c++});let h=monthSelector('renderAnalysis()');h+='<div class="section-title">📊 AI 운영 분석</div>';h+='<div class="analysis-card"><h4>📈 수익 구조</h4><p>계약 <b>'+fmt(tc)+'원</b> | 에코 <b>'+fmt(te)+'원</b> | 작업자 <b>'+fmt(tw)+'원</b><br>마진: <b>'+fmt(mg)+'원 ('+mr+'%)</b></p></div>';if(low.length)h+='<div class="analysis-card"><h4>⚠️ 마진 낮은 업체</h4><p>'+low.map(c=>'<b>'+c.n+'</b> ('+c.a+') - '+c.r.toFixed(1)+'%').join('<br>')+'</p></div>';if(high.length)h+='<div class="analysis-card"><h4>💰 수익성 높은 업체</h4><p>'+high.map(c=>'<b>'+c.n+'</b> ('+c.a+') - '+c.r.toFixed(1)+'%').join('<br>')+'</p></div>';h+='<div class="analysis-card"><h4>👥 담당자 업무량</h4><p>'+Object.entries(sw).sort((a,b)=>b[1].t-a[1].t).map(([n,i])=>'<b>'+n+'</b>: '+i.c+'개, '+fmt(i.t)+'원').join('<br>')+'</p></div>';document.getElementById('mainContent').innerHTML=h}
function toast(m,t='success'){const e=document.createElement('div');e.className='toast '+t;e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),3000)}
</script>
