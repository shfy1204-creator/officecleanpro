<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>오피스클린프로</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0ea5e9">
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/static/pretendard.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--bg4:#475569;
  --tx:#f8fafc;--tx2:#94a3b8;--tx3:#64748b;
  --ac:#0ea5e9;--ac2:#38bdf8;--ac3:#0284c7;
  --gn:#10b981;--gn2:#059669;
  --rd:#ef4444;--yl:#f59e0b;--pp:#a78bfa;
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
.hidden{display:none!important}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%)}
.login-box{width:90%;max-width:380px;padding:40px 30px;background:rgba(30,41,59,.9);
  border-radius:20px;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);
  box-shadow:0 25px 60px rgba(0,0,0,.5)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--ac2),var(--gn));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.login-logo p{color:var(--tx2);font-size:13px;margin-top:6px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:var(--tx2);margin-bottom:6px;font-weight:600}
.form-group input,.form-group select{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--bg3);
  border-radius:var(--radius-sm);color:var(--tx);font-size:15px;outline:none;transition:.2s}
.form-group input:focus,.form-group select:focus{border-color:var(--ac)}
.btn{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;
  cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--ac),var(--ac3));color:#fff;margin-top:8px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(14,165,233,.3)}
.login-error{color:var(--rd);font-size:12px;text-align:center;margin-top:10px;min-height:18px}
.login-tabs{display:flex;margin-bottom:24px;background:var(--bg);border-radius:var(--radius-sm);overflow:hidden}
.login-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;
  color:var(--tx3);transition:.2s;border:2px solid transparent}
.login-tab.active{background:var(--bg2);color:var(--ac);border-color:var(--ac)}

/* LOADING OVERLAY */
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.spinner{width:44px;height:44px;border:3px solid var(--bg3);border-top-color:var(--ac);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--tx2);font-size:14px;text-align:center}
.loading-sub{color:var(--tx3);font-size:12px}

/* MAIN LAYOUT */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;
  background:var(--bg2);border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:100}
.topbar h2{font-size:17px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-user{font-size:12px;color:var(--tx2)}
.btn-sm{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;
  background:var(--bg3);color:var(--tx2);transition:.2s}
.btn-sm:hover{background:var(--bg4)}
.btn-refresh{background:rgba(14,165,233,.15);color:var(--ac)}

/* SYNC BAR */
.sync-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:11px;color:var(--tx3);
  background:var(--bg);border-bottom:1px solid rgba(255,255,255,.04)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--gn);flex-shrink:0}
.sync-dot.error{background:var(--rd)}
.sync-dot.loading{background:var(--yl);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* BOTTOM NAV */
.bottomnav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--bg2);
  border-top:1px solid rgba(255,255,255,.06);z-index:100;padding:6px 0;
  padding-bottom:max(6px,env(safe-area-inset-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;
  cursor:pointer;color:var(--tx3);transition:.2s;font-size:10px;font-weight:600}
.nav-item.active{color:var(--ac)}
.nav-item svg{width:22px;height:22px}
.content{flex:1;padding:16px;padding-bottom:80px;max-width:800px;margin:0 auto;width:100%}

/* CARDS & STATS */
.card{background:var(--bg2);border-radius:var(--radius);padding:18px;margin-bottom:14px;
  border:1px solid rgba(255,255,255,.05)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.card-title{font-size:15px;font-weight:700}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:rgba(14,165,233,.15);color:var(--ac2)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border-radius:var(--radius);padding:16px;border:1px solid rgba(255,255,255,.05)}
.stat-label{font-size:11px;color:var(--tx3);font-weight:600;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.stat-sub{font-size:11px;color:var(--tx3);margin-top:2px}

/* DATA ROW */
.data-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);
  border-radius:var(--radius-sm);margin-bottom:4px;border:1px solid rgba(255,255,255,.03);
  font-size:13px;cursor:pointer;transition:.15s}
.data-row:hover{border-color:rgba(14,165,233,.2)}
.data-code{min-width:55px;font-weight:700;color:var(--ac);font-size:11px}
.data-company{flex:1;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.data-worker{min-width:50px;text-align:center;font-size:12px;color:var(--pp)}
.data-day{min-width:36px;text-align:center;font-size:11px;color:var(--yl)}
.data-amount{min-width:70px;text-align:right;font-weight:700;color:var(--gn);font-size:12px}

.area-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;
  background:linear-gradient(135deg,rgba(14,165,233,.12),rgba(16,185,129,.08));
  border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer}
.area-name{font-size:14px;font-weight:700}
.area-total{font-size:14px;font-weight:700;color:var(--gn)}

.key-panel{margin-top:8px;padding:10px 12px;background:rgba(14,165,233,.08);border-radius:8px;
  border-left:3px solid var(--ac)}
.key-panel-title{font-size:10px;color:var(--ac);font-weight:700;margin-bottom:4px}
.key-panel-text{font-size:12px;color:var(--tx2);line-height:1.5;word-break:break-all}

.month-selector{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.month-btn{padding:8px 20px;border-radius:20px;border:1px solid var(--bg3);background:transparent;
  color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.month-btn.active{background:var(--ac);border-color:var(--ac);color:#fff}

.search-box{position:relative;margin-bottom:16px}
.search-box input{width:100%;padding:12px 16px 12px 40px;background:var(--bg2);border:1px solid var(--bg3);
  border-radius:var(--radius);color:var(--tx);font-size:14px;outline:none}
.search-box input:focus{border-color:var(--ac)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3)}

.filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.filter-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--bg3);background:transparent;
  color:var(--tx2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.2s}
.filter-chip.active{background:var(--ac);border-color:var(--ac);color:#fff}

.pay-card{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:10px;
  border:1px solid rgba(255,255,255,.05)}
.pay-worker{font-size:15px;font-weight:700;margin-bottom:8px;display:flex;justify-content:space-between}
.pay-total{color:var(--gn)}
.pay-detail-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;color:var(--tx2);
  border-bottom:1px solid rgba(255,255,255,.03)}
.pay-detail-amount{font-weight:600;color:var(--tx);min-width:80px;text-align:right}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);
  z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{width:100%;max-width:500px;max-height:85vh;background:var(--bg2);border-radius:20px 20px 0 0;
  padding:24px 20px;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 20px}
.modal h3{font-size:18px;font-weight:800;margin-bottom:4px}
.modal-loc{font-size:13px;color:var(--tx2);margin-bottom:16px}
.modal-info-row{display:flex;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.modal-info-label{width:80px;font-size:12px;color:var(--tx3);font-weight:600;flex-shrink:0}
.modal-info-value{font-size:13px;flex:1;line-height:1.4;word-break:break-all}
.modal-close{width:100%;padding:14px;background:var(--bg3);border:none;border-radius:var(--radius-sm);
  color:var(--tx);font-size:14px;font-weight:600;cursor:pointer;margin-top:10px}

.page{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr)}.content{padding:24px}}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingMsg">데이터 불러오는 중...</div>
  <div class="loading-sub" id="loadingSub">잠시만 기다려주세요</div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen hidden">
  <div class="login-box">
    <div class="login-logo">
      <h1>오피스클린프로</h1>
      <p>청소 관리 시스템</p>
    </div>
    <div class="login-tabs" style="display:none">
      <div class="login-tab active" onclick="setLoginMode('admin')">관리자</div>
    </div>
    <div id="adminLogin">
      <div class="form-group">
        <label>관리자 ID</label>
        <input type="text" id="adminId" placeholder="ID 입력">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="adminPw" placeholder="비밀번호 입력">
      </div>
      <button class="btn btn-primary" onclick="loginAdmin()">로그인</button>
    </div>
    <div id="empLogin" class="hidden">
      <div class="form-group">
        <label>직원 선택</label>
        <select id="empSelect"><option value="">선택하세요</option></select>
      </div>
      <button class="btn btn-primary" onclick="loginEmployee()">직원 로그인</button>
    </div>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="app hidden">
  <div class="topbar">
    <h2 id="pageTitle">대시보드</h2>
    <div class="topbar-right">
      <span class="topbar-user" id="currentUser"></span>
      <button class="btn-sm btn-refresh" onclick="refreshData()">↻ 새로고침</button>
      <button class="btn-sm" onclick="logout()">나가기</button>
    </div>
  </div>
  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">동기화 완료</span>
  </div>
  <div class="content" id="mainContent"></div>
  <div class="bottomnav" id="bottomNav"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

async function fetchSheet(sheetName) {
  return EMBEDDED_DATA[sheetName] || [];
}

function safeInt(s) {
  if (!s) return 0;
  const n = parseInt(String(s).replace(/[^0-9.-]/g, ''));
  return isNaN(n) ? 0 : n;
}

// ===== DATA LOADING =====
async function loadAllData() {
  const monthSheets = [
    { month:'2월', plan:'2월담당자예상계획', area:'2월 구역별정리' },
    { month:'3월', plan:'3월담당자예상계획', area:'3월 구역별정리' },
  ];

  try {
    // Fetch all sheets in parallel
    const [empRows, dayRows, ...monthResults] = await Promise.all([
      fetchSheet('인적정보'),
      fetchSheet('요일별정리'),
      ...monthSheets.flatMap(m => [fetchSheet(m.plan), fetchSheet(m.area)])
    ]);

    // Parse employees
    DATA.employees = [];
    for (let r = 1; r < empRows.length; r++) {
      const row = empRows[r];
      if (!row || !row[1]) continue;
      const name = row[1].trim();
      if (!name || name === '이름') continue;
      const loginId = (row[5] || name).trim();
      if (name) DATA.employees.push({ name, loginId: loginId || name });
    }

    // Parse 요일별정리 (day info with keys/parking)
    DATA.dayInfo = [];
    let curDay = '';
    for (let r = 0; r < dayRows.length; r++) {
      const row = dayRows[r];
      if (!row) continue;
      const a = (row[0]||'').trim();
      if (a.includes('요일')) { curDay = a; continue; }
      const company = (row[1]||'').trim();
      if (!company || company === '업체') continue;
      DATA.dayInfo.push({
        day: curDay,
        company,
        location: (row[2]||'').trim(),
        worker: (row[3]||'').trim(),
        amount: safeInt(row[4]),
        key: (row[5]||'').trim(),
        parking: (row[6]||'').trim(),
      });
    }

    // Parse monthly plan & area data
    DATA.plans = {};
    DATA.areas = {};
    DATA.months = [];

    for (let mi = 0; mi < monthSheets.length; mi++) {
      const m = monthSheets[mi];
      const planRows = monthResults[mi * 2];
      const areaRows = monthResults[mi * 2 + 1];

      // Parse plan (담당자예상계획)
      const planData = [];
      let lastCompany = '', lastCode = '', lastLoc = '';
      for (let r = 1; r < planRows.length; r++) {
        const row = planRows[r];
        if (!row || row.length < 11) continue;

        const code = (row[0]||'').trim();
        const company = (row[3]||'').trim();
        const worker = (row[10]||'').trim();
        const realAmt = safeInt(row[9]);

        if (!worker || !realAmt) continue;
        // Skip header rows
        if (worker === '담당자' || company === '업체이름') continue;

        if (company) {
          lastCompany = company; lastCode = code;
          lastLoc = (row[4]||'').trim();
        }

        planData.push({
          code: code || lastCode,
          company: company || lastCompany,
          location: (row[4]||'').trim() || lastLoc,
          contract: safeInt(row[5]),
          workerPay: safeInt(row[8]),
          realAmount: realAmt,
          worker,
          ratio: parseFloat(row[11]) || 0,
          day: (row[12]||'').trim(),
          count: safeInt(row[13]),
          note: (row[14]||'').trim(),
        });
      }

      if (planData.length) {
        DATA.plans[m.month] = planData;
        DATA.months.push(m.month);
      }

      // Parse area (구역별정리)
      const areaData = [];
      let curArea = '', curItems = [];
      for (let r = 0; r < areaRows.length; r++) {
        const row = areaRows[r];
        if (!row) continue;
        const b = (row[1]||'').trim();
        if (!b) continue;
        if (b === 'NO') continue;

        const company = (row[2]||'').trim();
        const iVal = safeInt(row[8]);

        // Area header: has a big number in column I but no company
        if (!company && iVal > 50000) {
          if (curArea && curItems.length) areaData.push({name:curArea, total:iVal, items:[...curItems]});
          curArea = b; curItems = [];
          continue;
        }

        if (!company) continue;

        curItems.push({
          code: b,
          company,
          location: (row[3]||'').trim(),
          amount: safeInt(row[4]),
          day: (row[5]||'').trim(),
          worker: (row[6]||'').trim(),
          note: (row[7]||'').trim(),
        });
      }
      if (curArea && curItems.length) areaData.push({name:curArea, total:safeInt(areaRows[0]?.[8])||0, items:[...curItems]});

      if (areaData.length) DATA.areas[m.month] = areaData;
    }

    // Default to latest month
    if (DATA.months.length && !DATA.months.includes(currentMonth)) {
      currentMonth = DATA.months[DATA.months.length - 1];
    }

    lastSync = new Date();
    console.log('Data loaded:', DATA.employees.length, 'employees,', DATA.months.length, 'months,', DATA.dayInfo.length, 'dayInfo');
    return true;
  } catch(err) {
    console.error('Load error:', err);
    return false;
  }
}

function setLoading(msg, sub) {

  if (el) { el.classList.remove('hidden'); document.getElementById('loadingMsg').textContent = msg; }
}
function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

function setSyncStatus(status, text) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if (!dot) return;
  dot.className = 'sync-dot' + (status==='error'?' error':status==='loading'?' loading':'');
  txt.textContent = text;
}

  const I={
    home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
    building:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22V10h6v12M9 6h.01M15 6h.01"/></svg>',
    users:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>',
    calendar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
    wallet:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M16 14h.01M2 10h20"/></svg>',
    key:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.78 7.78 5.5 5.5 0 017.78-7.78zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>',
    search:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
  };
  return I[n]||'';
}

// ===== LOGIN =====
let loginMode = 'admin';
function setLoginMode(mode) {
  loginMode = mode;
  document.querySelectorAll('.login-tab').forEach((t,i) => {
    t.classList.toggle('active',(mode==='admin'&&i===0)||(mode==='employee'&&i===1));
  });
  document.getElementById('adminLogin').classList.toggle('hidden',mode!=='admin');
  document.getElementById('empLogin').classList.toggle('hidden',mode!=='employee');
  document.getElementById('loginError').textContent='';
}

function showLogin() {
  hideLoading();
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('mainApp').classList.add('hidden');
  const sel = document.getElementById('empSelect');
  sel.innerHTML = '<option value="">선택하세요</option>';
  DATA.employees.forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.loginId; opt.textContent = e.name;
    sel.appendChild(opt);
  });
}

function loginAdmin() {
  const id = document.getElementById('adminId').value.trim();
  const pw = document.getElementById('adminPw').value.trim();
  if (id===ADMIN_ID && pw===ADMIN_PW) { currentRole='admin'; currentEmpName='관리자'; startApp(); }
  else document.getElementById('loginError').textContent='ID 또는 비밀번호가 틀립니다';
}

function loginEmployee() {
  const id = document.getElementById('empSelect').value;
  if (id) { currentRole='employee'; currentEmpName=id; startApp(); }
}

function logout() { currentRole=''; showLogin(); }

function startApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('currentUser').textContent = currentEmpName;
  setSyncStatus('ok', `동기화 완료 · ${lastSync?lastSync.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):''}`);
  buildNav();
  navigateTo(currentRole==='admin'?'dashboard':'my-schedule');
}

async function refreshData() {
  setSyncStatus('loading','새로고침 중...');
  await loadAllData();
  setSyncStatus('ok', `동기화 완료 · ${new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}`);
  navigateTo(currentPage);
}

// ===== NAV =====
function buildNav() {
  const nav = document.getElementById('bottomNav');
  const items = currentRole==='admin' ? [
    {id:'dashboard',icon:'home',label:'대시보드'},
    {id:'clients',icon:'building',label:'거래처'},
    {id:'workers',icon:'users',label:'담당자별'},
    {id:'weekday',icon:'calendar',label:'요일별'},
  ] : [
    {id:'my-schedule',icon:'calendar',label:'내 일정'},
    {id:'my-pay',icon:'wallet',label:'내 수당'},
    {id:'weekday-info',icon:'key',label:'출입정보'},
  ];
  nav.innerHTML = items.map(i=>`<div class="nav-item" id="nav-${i.id}" onclick="navigateTo('${i.id}')">${getIcon(i.icon)}<span>${i.label}</span></div>`).join('');
}

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el = document.getElementById('nav-'+page); if(el) el.classList.add('active');
  const titles = {'dashboard':'대시보드','clients':'거래처 현황','workers':'담당자별 수당',
    'weekday':'요일별 일정','my-schedule':'내 일정','my-pay':'내 수당','weekday-info':'출입/주차 정보'};
  document.getElementById('pageTitle').textContent = titles[page]||'';
  const c = document.getElementById('mainContent');
  switch(page){
    case 'dashboard':renderDashboard(c);break;case 'clients':renderClients(c);break;
    case 'workers':renderWorkers(c);break;case 'weekday':renderWeekday(c);break;
    case 'my-schedule':renderMySchedule(c);break;case 'my-pay':renderMyPay(c);break;
    case 'weekday-info':renderWeekdayInfo(c);break;
  }
}

function monthSelector() {
  return `<div class="month-selector">${DATA.months.map(m=>
    `<button class="month-btn ${m===currentMonth?'active':''}" onclick="currentMonth='${m}';navigateTo(currentPage)">${m}</button>`
  ).join('')}</div>`;
}

// ===== DATA HELPERS =====
function getPlans(m) { return DATA.plans[m]||[]; }
function getWorkerTotals(plans) {
  const map={};
  plans.forEach(a=>{if(!a.worker)return;if(!map[a.worker])map[a.worker]={name:a.worker,total:0,items:[]};map[a.worker].total+=a.realAmount;map[a.worker].items.push(a);});
  return Object.values(map).sort((a,b)=>b.total-a.total);
}

// ===== PAGES =====
function renderDashboard(c) {
  const plans = getPlans(currentMonth);
  const areas = DATA.areas[currentMonth]||[];
  const workers = getWorkerTotals(plans);
  const totalAmount = plans.reduce((s,a)=>s+a.realAmount,0);
  const uniqueCompanies = new Set(plans.filter(p=>p.company).map(p=>p.company)).size;

  c.innerHTML=`<div class="page">${monthSelector()}
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">총 작업자수당</div><div class="stat-value" style="color:var(--gn);font-size:18px">${fmtShort(totalAmount)}</div></div>
      <div class="stat-card"><div class="stat-label">거래처 수</div><div class="stat-value" style="color:var(--ac)">${uniqueCompanies}</div><div class="stat-sub">${areas.length}개 구역</div></div>
      <div class="stat-card"><div class="stat-label">담당자</div><div class="stat-value" style="color:var(--pp)">${workers.length}</div><div class="stat-sub">명 활동중</div></div>
      <div class="stat-card"><div class="stat-label">총 수당지급</div><div class="stat-value" style="color:var(--yl);font-size:18px">${fmtShort(totalAmount)}</div></div>
    </div>
    <div class="card"><div class="card-header"><span class="card-title">구역별 수당 현황</span></div>
      ${areas.map(a=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)">
        <div><div style="font-weight:700;font-size:14px">${a.name}</div><div style="font-size:11px;color:var(--tx3)">${a.items.length}개 업체</div></div>
        <div style="font-weight:700;color:var(--gn)">${fmt(a.total)}</div></div>`).join('')}
    </div>
    <div class="card"><div class="card-header"><span class="card-title">담당자별 수당 순위</span></div>
      ${workers.map((w,i)=>{const pct=Math.round(w.total/totalAmount*100);return `<div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-weight:600;font-size:14px">${i+1}. ${w.name}</span><span style="font-weight:700;color:var(--gn)">${fmt(w.total)}</span></div>
        <div style="height:6px;background:var(--bg);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--ac),var(--gn));border-radius:3px"></div></div></div>`;}).join('')}
    </div></div>`;
}

function renderClients(c) {
  const areas = DATA.areas[currentMonth]||[];
  c.innerHTML=`<div class="page">${monthSelector()}
    <div class="search-box">${getIcon('search')}<input type="text" id="clientSearch" placeholder="업체명, 담당자 검색..." oninput="filterClients()"></div>
    <div id="clientList">${renderAreaList(areas)}</div></div>`;
}

function renderAreaList(areas, filter='') {
  return areas.map(a=>{
    let items = a.items;
    if(filter){const f=filter.toLowerCase();items=items.filter(i=>i.company.toLowerCase().includes(f)||i.worker.toLowerCase().includes(f)||i.code.toLowerCase().includes(f));}
    if(!items.length)return '';
    return `<div style="margin-bottom:16px">
      <div class="area-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
        <span class="area-name">${a.name} <span style="font-size:11px;color:var(--tx3)">(${items.length})</span></span>
        <span class="area-total">${fmt(items.reduce((s,i)=>s+i.amount,0))}</span></div>
      <div>${items.map(i=>`<div class="data-row" onclick='showDetail(${JSON.stringify(i).replace(/'/g,"&#39;")})'>
        <span class="data-code">${i.code}</span><span class="data-company">${i.company}</span>
        <span class="data-worker">${i.worker}</span><span class="data-day">${i.day}</span>
        <span class="data-amount">${fmt(i.amount)}</span></div>`).join('')}</div></div>`;
  }).join('');
}

function filterClients(){
  const q=document.getElementById('clientSearch').value;
  const areas=DATA.areas[currentMonth]||[];
  document.getElementById('clientList').innerHTML=renderAreaList(areas,q);
}

function showDetail(item) {
  const co = DATA.dayInfo.find(d=>d.company===item.company||(item.company.length>3&&d.company.includes(item.company.substring(0,4)))||(d.company.length>3&&item.company.includes(d.company.substring(0,4))));
  document.getElementById('modalContent').innerHTML=`
    <div class="modal-handle"></div><h3>${item.company}</h3><div class="modal-loc">${item.location}</div>
    <div>
      <div class="modal-info-row"><span class="modal-info-label">구역코드</span><span class="modal-info-value">${item.code}</span></div>
      <div class="modal-info-row"><span class="modal-info-label">담당자</span><span class="modal-info-value">${item.worker}</span></div>
      <div class="modal-info-row"><span class="modal-info-label">청소요일</span><span class="modal-info-value">${item.day}</span></div>
      <div class="modal-info-row"><span class="modal-info-label">수당</span><span class="modal-info-value" style="color:var(--gn);font-weight:700">${fmt(item.amount)}</span></div>
      ${item.note?`<div class="modal-info-row"><span class="modal-info-label">비고</span><span class="modal-info-value">${item.note}</span></div>`:''}
      ${co&&co.key?`<div class="modal-info-row"><span class="modal-info-label">출입키</span><span class="modal-info-value">${co.key}</span></div>`:''}
      ${co&&co.parking?`<div class="modal-info-row"><span class="modal-info-label">주차</span><span class="modal-info-value">${co.parking}</span></div>`:''}
    </div><button class="modal-close" onclick="closeModal()">닫기</button>`;
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal(){document.getElementById('modal').classList.add('hidden');}

function renderWorkers(c) {
  const workers = getWorkerTotals(getPlans(currentMonth));
  c.innerHTML=`<div class="page">${monthSelector()}
    ${workers.map(w=>`<div class="pay-card"><div class="pay-worker"><span>${w.name}</span><span class="pay-total">${fmt(w.total)}</span></div>
      <div>${w.items.map(i=>`<div class="pay-detail-row"><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.company} <span style="color:var(--yl)">${i.day}</span></span>
        <span class="pay-detail-amount">${fmt(i.realAmount)}</span></div>`).join('')}</div></div>`).join('')}</div>`;
}

function renderWeekday(c) {
  const days=['월요일','화요일','수요일','목요일','금요일','토요일','일요일'];
  const grouped={};DATA.dayInfo.forEach(d=>{const k=d.day||'기타';if(!grouped[k])grouped[k]=[];grouped[k].push(d);});
  c.innerHTML=`<div class="page">
    <div class="filter-row" id="dayFilter"><div class="filter-chip active" onclick="filterDay('')">전체</div>
      ${days.filter(d=>grouped[d]).map(d=>`<div class="filter-chip" onclick="filterDay('${d}')">${d}</div>`).join('')}</div>
    <div id="dayList">${renderDayCards(DATA.dayInfo)}</div></div>`;
}

function renderDayCards(items) {
  return items.map(d=>`<div class="card" style="padding:14px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="flex:1"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span class="badge badge-blue">${d.day}</span><span style="font-weight:700;font-size:14px">${d.company}</span></div>
        <div style="font-size:12px;color:var(--tx2);margin-bottom:6px">${d.location}</div>
        <div style="font-size:12px;color:var(--pp)">${d.worker}</div></div>
      <div style="font-weight:700;color:var(--gn);font-size:13px">${fmt(d.amount)}</div></div>
    ${d.key?`<div class="key-panel" style="margin-top:10px"><div class="key-panel-title">🔑 출입키</div><div class="key-panel-text">${d.key}</div></div>`:''}
    ${d.parking?`<div class="key-panel" style="margin-top:6px;border-left-color:var(--yl)"><div class="key-panel-title" style="color:var(--yl)">🚗 주차</div><div class="key-panel-text">${d.parking}</div></div>`:''}
  </div>`).join('');
}

function filterDay(day){
  document.querySelectorAll('#dayFilter .filter-chip').forEach(c=>c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('dayList').innerHTML=renderDayCards(day?DATA.dayInfo.filter(d=>d.day===day):DATA.dayInfo);
}

// EMPLOYEE PAGES
function renderMySchedule(c) {
  const mine = getPlans(currentMonth).filter(a=>a.worker===currentEmpName);
  const byDay={};mine.forEach(s=>{const d=s.day||'기타';if(!byDay[d])byDay[d]=[];byDay[d].push(s);});
  const total=mine.reduce((s,i)=>s+i.realAmount,0);
  c.innerHTML=`<div class="page">${monthSelector()}
    <div class="stats-grid" style="grid-template-columns:1fr 1fr">
      <div class="stat-card"><div class="stat-label">${currentMonth} 총 수당</div><div class="stat-value" style="color:var(--gn)">${fmtShort(total)}</div></div>
      <div class="stat-card"><div class="stat-label">담당 업체</div><div class="stat-value" style="color:var(--ac)">${mine.length}</div><div class="stat-sub">건</div></div></div>
    ${Object.entries(byDay).map(([day,items])=>`<div class="card">
      <div class="card-header"><span class="badge badge-blue">${day}</span>
        <span style="font-size:13px;font-weight:700;color:var(--gn)">${fmt(items.reduce((s,i)=>s+i.realAmount,0))}</span></div>
      ${items.map(i=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)">
        <div><div style="font-weight:700;font-size:14px">${i.company}</div><div style="font-size:12px;color:var(--tx2)">${i.location}</div>
          <div style="display:flex;gap:6px;margin-top:4px">
            ${i.ratio?`<span style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(255,255,255,.06);color:var(--tx2)">비율 ${i.ratio}</span>`:''}
            ${i.note?`<span style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(255,255,255,.06);color:var(--yl)">${i.note}</span>`:''}
          </div></div>
        <div style="font-weight:700;color:var(--gn);white-space:nowrap">${fmt(i.realAmount)}</div></div>`).join('')}
    </div>`).join('')}
    ${!mine.length?'<div style="text-align:center;padding:40px;color:var(--tx3)">이 달에 배정된 업체가 없어요</div>':''}</div>`;
}

function renderMyPay(c) {
  const payData=DATA.months.map(m=>{const mine=getPlans(m).filter(a=>a.worker===currentEmpName);return{month:m,total:mine.reduce((s,i)=>s+i.realAmount,0),items:mine};});
  const latest=payData[payData.length-1]||{total:0,month:''};
  c.innerHTML=`<div class="page">
    <div class="card" style="background:linear-gradient(135deg,rgba(16,185,129,.15),rgba(14,165,233,.1))">
      <div style="text-align:center;padding:10px 0"><div style="font-size:12px;color:var(--tx2);margin-bottom:4px">${currentEmpName}님의 수당 내역</div>
        <div style="font-size:28px;font-weight:800;color:var(--gn)">${fmt(latest.total)}</div>
        <div style="font-size:11px;color:var(--tx3);margin-top:4px">${latest.month} 기준</div></div></div>
    ${payData.map(pd=>`<div class="card"><div class="card-header"><span class="card-title">${pd.month} 상세</span>
      <span style="font-weight:700;color:var(--gn)">${fmt(pd.total)}</span></div>
      ${pd.items.length?pd.items.map(i=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px">
        <div><div style="font-weight:600">${i.company}</div><div style="font-size:11px;color:var(--tx3)">${i.day} ${i.ratio?'(비율 '+i.ratio+')':''}</div></div>
        <div style="font-weight:700;color:var(--gn)">${fmt(i.realAmount)}</div></div>`).join('')
      :'<div style="font-size:13px;color:var(--tx3);text-align:center;padding:20px">데이터 없음</div>'}</div>`).join('')}</div>`;
}

function renderWeekdayInfo(c) {
  const myInfo=DATA.dayInfo.filter(d=>d.worker&&d.worker.includes(currentEmpName));
  c.innerHTML=`<div class="page">
    ${myInfo.length?`<div style="margin-bottom:16px"><div style="font-size:13px;font-weight:700;color:var(--ac);margin-bottom:10px">내 담당 업체 출입정보</div>${renderDayCards(myInfo)}</div>`:''}
    <div style="font-size:13px;font-weight:700;color:var(--tx3);margin-bottom:10px">전체 출입/주차 정보</div>${renderDayCards(DATA.dayInfo)}</div>`;
}

// Enter key
document.getElementById('adminPw')?.addEventListener('keypress',e=>{if(e.key==='Enter')loginAdmin();});

// ===== INIT =====
(async function(){
  try { await loadAllData(); } catch(e) { console.error('Init error:', e); }
  showLogin();
})();
</script>
</body>
</html>
